name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'RecordFlow ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            ## RecordFlow - Screen & Camera Recording App
            
            ### Download
            Download the `.exe` or `.msi` installer for Windows below.
            
            ### Features
            - Screen recording with customizable resolution (720p/1080p)
            - Camera overlay with adjustable position and size
            - Microphone audio recording with volume control
            - Pause/Resume recording
            - Recording history
            
            ### System Requirements
            - Windows 10 version 1903 or later
            - x64 architecture
            
            ### Installation
            1. Download the `.exe` or `.msi` file below
            2. Run the installer
            3. Follow the installation wizard
            4. Launch RecordFlow from the Start Menu
            
            ### Changelog
            - Fixed screen recording initialization issues
            - Fixed camera preview and recording
            - Improved error handling and user feedback
            - Enhanced UI with better layout and controls
          releaseDraft: false
          prerelease: false
